<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — CutLab</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">✂ CutLab</a>
    <div class="navbar-nav ms-auto flex-row gap-3">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link active" href="projects.html">Projects</a>
      <a class="nav-link" href="editor.html">Editor</a>
      <a class="nav-link" href="about.html">About</a>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h1>📁 My Projects</h1>
      <p>Create and manage your video editing projects</p>
    </div>
    <button class="btn btn-red" data-bs-toggle="modal" data-bs-target="#newProjectModal">
      + New Project
    </button>
  </div>
</div>

<div class="container py-4">
  <div id="alertBox"></div>
  <div id="projectsList">
    <div class="empty-state">
      <h3>📁</h3>
      <p>No projects yet. Click "New Project" to start!</p>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal fade" id="newProjectModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create New Project</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Project Title *</label>
          <input type="text" id="newTitle" class="form-control" placeholder="My Awesome Video"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Genre</label>
          <select id="newGenre" class="form-select">
            <option>General</option>
            <option>Vlog</option>
            <option>Short Film</option>
            <option>Documentary</option>
            <option>Music Video</option>
            <option>Tutorial</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="newDesc" class="form-control" rows="3" placeholder="What is this project about?"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-red" onclick="createProject()">Create Project</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT PROJECT MODAL -->
<div class="modal fade" id="editProjectModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Project</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId"/>
        <div class="mb-3">
          <label class="form-label">Project Title</label>
          <input type="text" id="editTitle" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select id="editStatus" class="form-select">
            <option>In Progress</option>
            <option>Completed</option>
            <option>On Hold</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="editDesc" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-red" onclick="updateProject()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">✂ CutLab — Video Editing Tool | Node.js + Express</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

// ── Load all projects when page opens ──
window.onload = loadProjects;

function loadProjects() {
  fetch('/api/projects')
    .then(r => r.json())
    .then(res => {
      const list = document.getElementById('projectsList');
      if (res.data.length === 0) {
        list.innerHTML = `<div class="empty-state"><h3>📁</h3><p>No projects yet. Click "New Project" to start!</p></div>`;
        return;
      }
      list.innerHTML = res.data.map(p => `
        <div class="project-card">
          <div class="d-flex justify-content-between align-items-start">
            <h5>${p.title}</h5>
            <span class="badge">${p.genre}</span>
          </div>
          <div class="meta">📅 ${new Date(p.createdAt).toLocaleDateString()} &nbsp;|&nbsp; 🎬 ${p.clipCount} clips &nbsp;|&nbsp; ${p.status}</div>
          <p style="color:#888; font-size:0.9rem">${p.description || 'No description'}</p>
          <div class="actions">
            <a href="editor.html?id=${p.id}" class="btn btn-red btn-sm">✂ Open Editor</a>
            <button class="btn btn-outline-red btn-sm" onclick="openEdit('${p.id}','${p.title}','${p.status}','${p.description}')">✏ Edit</button>
            <button class="btn btn-sm" style="border:1px solid #555; color:#ccc" onclick="deleteProject('${p.id}')">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    });
}

// ── Create new project ──
function createProject() {
  const title = document.getElementById('newTitle').value.trim();
  const genre = document.getElementById('newGenre').value;
  const description = document.getElementById('newDesc').value;

  if (!title) { showAlert('Please enter a title!', 'danger'); return; }

  fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, genre, description })
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      bootstrap.Modal.getInstance(document.getElementById('newProjectModal')).hide();
      document.getElementById('newTitle').value = '';
      document.getElementById('newDesc').value = '';
      showAlert('✅ Project created!', 'success');
      loadProjects();
    }
  });
}

// ── Open edit modal ──
function openEdit(id, title, status, desc) {
  document.getElementById('editId').value = id;
  document.getElementById('editTitle').value = title;
  document.getElementById('editStatus').value = status;
  document.getElementById('editDesc').value = desc;
  new bootstrap.Modal(document.getElementById('editProjectModal')).show();
}

// ── Update project ──
function updateProject() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value;
  const status = document.getElementById('editStatus').value;
  const description = document.getElementById('editDesc').value;

  fetch(`/api/projects/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, status, description })
  })
  .then(r => r.json())
  .then(() => {
    bootstrap.Modal.getInstance(document.getElementById('editProjectModal')).hide();
    showAlert('✅ Project updated!', 'success');
    loadProjects();
  });
}

// ── Delete project ──
function deleteProject(id) {
  if (!confirm('Are you sure you want to delete this project?')) return;
  fetch(`/api/projects/${id}`, { method: 'DELETE' })
    .then(() => { showAlert('🗑 Project deleted!', 'danger'); loadProjects(); });
}

// ── Show alert message ──
function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-${type} alert-dismissible">${msg}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
  setTimeout(() => box.innerHTML = '', 3000);
}
</script>
</body>
</html>
