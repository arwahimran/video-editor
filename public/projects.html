<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects — CutLab</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">
  <div class="brand-logo">✏</div>
  EditPro
</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="projects.html">Projects</a>
        <a class="nav-link" href="editor.html">Editor</a>
        <a class="nav-link" href="about.html">About</a>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
      <h1>📁 My Projects</h1>
      <p>Create and manage your video editing projects</p>
    </div>
    <button class="btn-red" data-bs-toggle="modal" data-bs-target="#newProjectModal">
      + New Project
    </button>
  </div>
</div>

<div class="container py-4">
  <div id="alertBox"></div>
  <div id="projectsList">
    <div class="empty-state">
      <div class="empty-icon">📁</div>
      <p>No projects yet. Click "New Project" to start!</p>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal fade" id="newProjectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">✨ Create New Project</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="form-label">Project Title *</label>
          <input type="text" id="newTitle" class="form-control" placeholder="My Awesome Video"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Genre</label>
          <select id="newGenre" class="form-select">
            <option>General</option>
            <option>Vlog</option>
            <option>Short Film</option>
            <option>Documentary</option>
            <option>Music Video</option>
            <option>Tutorial</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="newDesc" class="form-control" rows="3" placeholder="What is this project about?"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-red" onclick="createProject()">Create Project</button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT PROJECT MODAL -->
<div class="modal fade" id="editProjectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">✏ Edit Project</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="editId"/>
        <div class="mb-3">
          <label class="form-label">Project Title</label>
          <input type="text" id="editTitle" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Status</label>
          <select id="editStatus" class="form-select">
            <option>In Progress</option>
            <option>Completed</option>
            <option>On Hold</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea id="editDesc" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-red" onclick="updateProject()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">✂ <strong>EditPro</strong> — Video Editing Tool | Node.js + Express</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
window.onload = loadProjects;

function getStatusClass(status) {
  if (status === 'Completed') return 'status-completed';
  if (status === 'On Hold') return 'status-hold';
  return 'status-progress';
}

function loadProjects() {
  fetch('/api/projects')
    .then(r => r.json())
    .then(res => {
      const list = document.getElementById('projectsList');
      if (res.data.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><p>No projects yet. Click "New Project" to start!</p></div>`;
        return;
      }
      list.innerHTML = res.data.map(p => `
        <div class="project-card">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">
            <h5>${p.title}</h5>
            <div class="d-flex gap-2 flex-wrap">
              <span class="badge-genre">${p.genre}</span>
              <span class="status-badge ${getStatusClass(p.status)}">${p.status}</span>
            </div>
          </div>
          <div class="meta">📅 ${new Date(p.createdAt).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})} &nbsp;·&nbsp; 🎬 ${p.clipCount} clips</div>
          <p class="description">${p.description || 'No description added.'}</p>
          <div class="actions">
            <a href="editor.html?id=${p._id}" class="btn-red" style="font-size:0.85rem; padding:8px 16px;">✂ Open Editor</a>
            <button class="btn-outline-red" style="font-size:0.85rem; padding:8px 16px;" onclick="openEdit('${p._id}','${p.title}','${p.status}','${(p.description||'').replace(/'/g,"\\'")}')">✏ Edit</button>
            <button onclick="deleteProject('${p._id}')" style="background:#1a1a1a; border:1px solid #333; color:#888; padding:8px 16px; border-radius:10px; font-size:0.85rem; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.borderColor='#e50914';this.style.color='#e50914'" onmouseout="this.style.borderColor='#333';this.style.color='#888'">🗑 Delete</button>
          </div>
        </div>
      `).join('');
    });
}

function createProject() {
  const title = document.getElementById('newTitle').value.trim();
  const genre = document.getElementById('newGenre').value;
  const description = document.getElementById('newDesc').value;
  if (!title) { showAlert('Please enter a project title!', 'danger'); return; }
  fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, genre, description })
  })
  .then(r => r.json())
  .then(res => {
    if (res.success) {
      bootstrap.Modal.getInstance(document.getElementById('newProjectModal')).hide();
      document.getElementById('newTitle').value = '';
      document.getElementById('newDesc').value = '';
      showAlert('✅ Project created successfully!', 'success');
      loadProjects();
    }
  });
}

function openEdit(id, title, status, desc) {
  document.getElementById('editId').value = id;
  document.getElementById('editTitle').value = title;
  document.getElementById('editStatus').value = status;
  document.getElementById('editDesc').value = desc;
  new bootstrap.Modal(document.getElementById('editProjectModal')).show();
}

function updateProject() {
  const id = document.getElementById('editId').value;
  const title = document.getElementById('editTitle').value;
  const status = document.getElementById('editStatus').value;
  const description = document.getElementById('editDesc').value;
  fetch(`/api/projects/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, status, description })
  })
  .then(r => r.json())
  .then(() => {
    bootstrap.Modal.getInstance(document.getElementById('editProjectModal')).hide();
    showAlert('✅ Project updated!', 'success');
    loadProjects();
  });
}

function deleteProject(id) {
  if (!confirm('Are you sure you want to delete this project?')) return;
  fetch(`/api/projects/${id}`, { method: 'DELETE' })
    .then(() => { showAlert('🗑 Project deleted!', 'danger'); loadProjects(); });
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-${type} alert-dismissible">${msg}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
  setTimeout(() => box.innerHTML = '', 3000);
}
</script>
</body>
</html>
